name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      # go mod tidy drift-check is deferred until M3: the go tool excludes
      # testdata/ from module graph resolution, so testdata/agent's gosnmp
      # import keeps it indirect/prunable until client/ imports it directly.
      - name: Verify modules
        run: go mod verify
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with: { version: v2.12.2 }
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage gate
        run: |
          go tool cover -func=coverage.out | \
          awk '/total/{if ($3+0 < 80) {print "Coverage "$3" < 80%"; exit 1}}'
      - name: Build
        run: go build ./...
